lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      '@types/node':
        specifier: workspace:*
        version: link:packages/types-node
      prettier:
        specifier: workspace:*
        version: link:packages/prettier
      tsx:
        specifier: workspace:*
        version: link:packages/tsx
      typescript:
        specifier: workspace:*
        version: link:packages/typescript
      vitest:
        specifier: workspace:*
        version: link:packages/vitest

  packages/core:
    dependencies:
      zod:
        specifier: workspace:*
        version: link:../zod
    devDependencies:
      tsup:
        specifier: workspace:*
        version: link:../tsup
      typescript:
        specifier: workspace:*
        version: link:../typescript

  packages/prettier: {}

  packages/tsup: {}

  packages/tsx: {}

  packages/types-node: {}

  packages/typescript: {}

  packages/vitest: {}

  packages/zod: {}
